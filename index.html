<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>KI Kalorien-Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23e94560' width='100' height='100' rx='20'/%3E%3Ctext x='50' y='65' font-size='45' text-anchor='middle'%3E🥗%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 400px; margin: 0 auto; }
        h1 { text-align: center; margin: 20px 0 10px; font-size: 24px; }
        .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 25px; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .stat-value { font-size: 24px; font-weight: bold; color: #e94560; }
        .stat-label { font-size: 11px; color: #888; margin-top: 5px; }
        
        .btn-primary {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            transition: transform 0.2s;
        }
        .btn-primary:active { transform: scale(0.98); }
        
        .btn-secondary {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        input[type="file"] { display: none; }
        
        .meals-list { margin-top: 20px; }
        .meal-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .meal-img {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            object-fit: cover;
            background: #333;
        }
        .meal-info { flex: 1; }
        .meal-name { font-weight: 600; font-size: 15px; }
        .meal-time { font-size: 12px; color: #888; margin-top: 3px; }
        .meal-cal { font-size: 18px; font-weight: bold; color: #e94560; }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .empty-state svg { width: 60px; height: 60px; opacity: 0.3; margin-bottom: 15px; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            padding: 20px;
        }
        .modal.active { display: flex; flex-direction: column; }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-title { font-size: 18px; }
        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
        .preview-img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .input-group { margin-bottom: 15px; }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #888;
            font-size: 14px;
        }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
        }
        .input-group textarea { min-height: 80px; resize: none; }
        
        .macro-inputs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .date-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px 0;
        }
        .date-nav button {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            color: #fff;
            cursor: pointer;
        }
        .current-date { font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥗 Kalorien-Tracker</h1>
        <p class="subtitle">KI-gestützte Mahlzeiten-Analyse</p>
        
        <div class="date-nav">
            <button onclick="changeDate(-1)">‹</button>
            <span class="current-date" id="currentDate">Heute</span>
            <button onclick="changeDate(1)">›</button>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalCals">0</div>
                <div class="stat-label">kcal</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalProtein">0</div>
                <div class="stat-label">Protein (g)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="mealCount">0</div>
                <div class="stat-label">Mahlzeiten</div>
            </div>
        </div>
        
        <label class="btn-primary">
            📷 Foto aufnehmen
            <input type="file" id="cameraInput" accept="image/*" capture="environment">
        </label>
        
        <label class="btn-primary" style="background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);">
            🖼️ Galerie wählen
            <input type="file" id="galleryInput" accept="image/*">
        </label>
        
        <button class="btn-secondary" onclick="addManualEntry()">
            ✏️ Manuelle Eingabe
        </button>
        
        <div class="meals-list" id="mealsList">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/></svg>
                <p>Noch keine Mahlzeiten heute</p>
                <p style="font-size: 12px; margin-top: 5px;">Mache ein Foto oder trage manuell ein</p>
            </div>
        </div>
    </div>
    
    <div class="modal" id="entryModal">
        <div class="modal-header">
            <span class="modal-title">Mahlzeit hinzufügen</span>
            <button class="close-btn" onclick="closeModal()">×</button>
        </div>
        <img class="preview-img" id="previewImg" style="display: none;">
        <div class="input-group">
            <label>Beschreibung</label>
            <textarea id="mealDesc" placeholder="z.B. Haferflocken mit Banane"></textarea>
        </div>
        <div class="input-group">
            <label>Kalorien</label>
            <input type="number" id="mealCals" placeholder="350">
        </div>
        <div class="macro-inputs">
            <div class="input-group">
                <label>Protein (g)</label>
                <input type="number" id="mealProtein" placeholder="12">
            </div>
            <div class="input-group">
                <label>Fett (g)</label>
                <input type="number" id="mealFat" placeholder="8">
            </div>
            <div class="input-group">
                <label>KH (g)</label>
                <input type="number" id="mealCarbs" placeholder="45">
            </div>
        </div>
        <button class="btn-primary" onclick="saveEntry()" style="margin-top: 20px;">Speichern</button>
        <button class="btn-secondary" onclick="analyzeWithAI()" id="aiBtn" style="display: none;">
            🤖 Mit KI analysieren
        </button>
    </div>
    
    <script>
        let currentImage = null;
        let selectedDate = new Date().toISOString().split('T')[0];
        
        loadMeals();
        updateDateDisplay();
        
        document.getElementById('cameraInput').addEventListener('change', handleImage);
        document.getElementById('galleryInput').addEventListener('change', handleImage);
        
        function handleImage(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                currentImage = event.target.result;
                document.getElementById('previewImg').src = currentImage;
                document.getElementById('previewImg').style.display = 'block';
                document.getElementById('aiBtn').style.display = 'block';
                document.getElementById('entryModal').classList.add('active');
            };
            reader.readAsDataURL(file);
        }
        
        function addManualEntry() {
            currentImage = null;
            document.getElementById('previewImg').style.display = 'none';
            document.getElementById('aiBtn').style.display = 'none';
            document.getElementById('mealDesc').value = '';
            document.getElementById('mealCals').value = '';
            document.getElementById('mealProtein').value = '';
            document.getElementById('mealFat').value = '';
            document.getElementById('mealCarbs').value = '';
            document.getElementById('entryModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('entryModal').classList.remove('active');
            currentImage = null;
        }
        
        function analyzeWithAI() {
            const desc = document.getElementById('mealDesc').value || 'Mahlzeit';
            const prompt = `Schätze Kalorien und Makros für: "${desc}". Gib nur Zahlen zurück: Kalorien, Protein(g), Fett(g), Kohlenhydrate(g). Format: "ca. 350 kcal | P: 12g | F: 8g | KH: 45g"`;
            
            if (navigator.share && currentImage) {
                fetch(currentImage)
                    .then(res => res.blob())
                    .then(blob => {
                        const file = new File([blob], 'meal.jpg', { type: 'image/jpeg' });
                        navigator.share({
                            text: `Schätze Kalorien für dieses Essen. ${prompt}`,
                            files: [file]
                        }).catch(() => {
                            fallbackShare(prompt);
                        });
                    });
            } else {
                fallbackShare(prompt);
            }
        }
        
        function fallbackShare(prompt) {
            const text = `ChatGPT/Claude fragen:\n\n${prompt}`;
            if (navigator.share) {
                navigator.share({ text: text });
            } else {
                navigator.clipboard.writeText(text);
                alert('Text kopiert! In ChatGPT einfügen oder manuell eintragen.');
            }
        }
        
        function saveEntry() {
            const meal = {
                id: Date.now(),
                date: selectedDate,
                description: document.getElementById('mealDesc').value || 'Mahlzeit',
                calories: parseInt(document.getElementById('mealCals').value) || 0,
                protein: parseInt(document.getElementById('mealProtein').value) || 0,
                fat: parseInt(document.getElementById('mealFat').value) || 0,
                carbs: parseInt(document.getElementById('mealCarbs').value) || 0,
                image: currentImage,
                time: new Date().toLocaleTimeString('de-DE', {hour: '2-digit', minute: '2-digit'})
            };
            
            const meals = JSON.parse(localStorage.getItem('meals') || '[]');
            meals.push(meal);
            localStorage.setItem('meals', JSON.stringify(meals));
            
            closeModal();
            loadMeals();
            
            document.getElementById('mealDesc').value = '';
            document.getElementById('mealCals').value = '';
            document.getElementById('mealProtein').value = '';
            document.getElementById('mealFat').value = '';
            document.getElementById('mealCarbs').value = '';
        }
        
        function loadMeals() {
            const allMeals = JSON.parse(localStorage.getItem('meals') || '[]');
            const meals = allMeals.filter(m => m.date === selectedDate).sort((a,b) => b.id - a.id);
            const list = document.getElementById('mealsList');
            
            const totalCals = meals.reduce((sum, m) => sum + (m.calories || 0), 0);
            const totalProtein = meals.reduce((sum, m) => sum + (m.protein || 0), 0);
            document.getElementById('totalCals').textContent = totalCals;
            document.getElementById('totalProtein').textContent = totalProtein;
            document.getElementById('mealCount').textContent = meals.length;
            
            if (meals.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/></svg>
                        <p>Noch keine Mahlzeiten ${selectedDate === new Date().toISOString().split('T')[0] ? 'heute' : 'an diesem Tag'}</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = meals.map(meal => `
                <div class="meal-item" onclick="deleteMeal(${meal.id})" style="cursor: pointer;">
                    ${meal.image ? `<img src="${meal.image}" class="meal-img">` : '<div class="meal-img" style="display:flex;align-items:center;justify-content:center;font-size:24px;">🍽️</div>'}
                    <div class="meal-info">
                        <div class="meal-name">${escapeHtml(meal.description)}</div>
                        <div class="meal-time">${meal.time} ${meal.protein ? `• ${meal.protein}g Protein` : ''}</div>
                    </div>
                    <div class="meal-cal">${meal.calories}</div>
                </div>
            `).join('');
        }
        
        function deleteMeal(id) {
            if (!confirm('Mahlzeit löschen?')) return;
            const meals = JSON.parse(localStorage.getItem('meals') || '[]');
            const filtered = meals.filter(m => m.id !== id);
            localStorage.setItem('meals', JSON.stringify(filtered));
            loadMeals();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function changeDate(direction) {
            const date = new Date(selectedDate);
            date.setDate(date.getDate() + direction);
            selectedDate = date.toISOString().split('T')[0];
            updateDateDisplay();
            loadMeals();
        }
        
        function updateDateDisplay() {
            const today = new Date().toISOString().split('T')[0];
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            const yestStr = yesterday.toISOString().split('T')[0];
            
            let text = selectedDate;
            if (selectedDate === today) text = 'Heute';
            else if (selectedDate === yestStr) text = 'Gestern';
            else text = new Date(selectedDate).toLocaleDateString('de-DE', {weekday: 'short', day: '.', month: '.'});
            
            document.getElementById('currentDate').textContent = text;
        }
    </script>
</body>
</html>
