    <style>

        :root {

            --ios-gray: #8E8E93;

        }
        
        @supports (padding-top: env(safe-area-inset-top)) {
            body { padding-top: env(safe-area-inset-top); }
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: var(--ios-bg);
            color: var(--ios-text);
            min-height: 100vh;
            padding-bottom: 40px;
        }
        
        .safe-area {

        }
        
        .header {
            text-align: center;

        }

            gap: 20px;

            background: var(--ios-card);
            display: flex;

            transition: transform 0.15s, background 0.15s;

        }

            font-weight: 700;
            letter-spacing: -0.5px;

        .date-display .subtitle {
            font-size: 15px;
            color: var(--ios-text-secondary);
            margin-top: 2px;
        }

            gap: 12px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--ios-card);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        
        .stat-card.large {
            grid-column: span 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px;
        }
        
        .stat-label {
            font-size: 13px;
            color: var(--ios-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--ios-text);
            margin-top: 6px;
            letter-spacing: -1px;

        .stat-card.large .stat-value {

        .stat-card.large .stat-label {
            text-align: left;
        }
        
        .stat-card.large .stat-label .sub {
            font-size: 15px;
            color: var(--ios-text-secondary);
            text-transform: none;
            margin-top: 4px;
            letter-spacing: 0;
        }

            stroke-width: 6;

        .ring-progress {

            stroke: var(--ios-blue);
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.6s ease;
        }
        
        .ring-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 13px;
            font-weight: 600;
            color: var(--ios-text);
        }

        .action-btn.secondary .action-icon {
            background: linear-gradient(135deg, #34C759 0%, #248A3D 100%);

        .action-text {

        .action-title {
            font-size: 17px;
            font-weight: 600;

        .action-subtitle {

            margin-top: 2px;
        }
        
        .action-arrow {
            font-size: 20px;
            color: var(--ios-gray);
            opacity: 0.4;
        }
        
        .section-header {

            justify-content: space-between;
            align-items: center;

        }
        
        .section-title {
            font-size: 20px;
            font-weight: 700;
        }
        
        .section-count {
            font-size: 15px;
            color: var(--ios-text-secondary);
            font-weight: 500;
        }
        
        .meals-list {

        }

        .meal-image-placeholder {

            backdrop-filter: blur(3px);
        }

            flex-direction: column;
            justify-content: flex-end;
        }

        }
